name: Build and Promote Container Images

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: Choose where to promote the current development release
        type: choice
        options: [staging, prod]
        required: true

env:
  AWS_ACCOUNT_ID_DEV: "484632959006"

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build_images:
    name: Build and publish frontend and backend images
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    outputs:
      frontend_image: ${{ steps.image_references.outputs.frontend }}
      backend_image: ${{ steps.image_references.outputs.backend }}
    steps:
      - name: Download the repository source code
        uses: actions/checkout@v4.2.2
      - name: Prepare the Docker image builder
        uses: docker/setup-buildx-action@v3.11.1
      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Create the container image names
        id: image_names
        shell: bash
        run: |
          set -euo pipefail
          repository="${GITHUB_REPOSITORY,,}"
          echo "frontend=ghcr.io/${repository}-frontend" >> "$GITHUB_OUTPUT"
          echo "backend=ghcr.io/${repository}-backend" >> "$GITHUB_OUTPUT"
      - name: Build and publish the frontend image
        id: frontend_build
        uses: docker/build-push-action@v6.18.0
        with:
          context: app/frontend
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image_names.outputs.frontend }}:sha-${{ github.sha }}
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
      - name: Build and publish the backend image
        id: backend_build
        uses: docker/build-push-action@v6.18.0
        with:
          context: app/backend
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image_names.outputs.backend }}:sha-${{ github.sha }}
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - name: Record the exact published image versions
        id: image_references
        shell: bash
        run: |
          set -euo pipefail
          frontend='${{ steps.image_names.outputs.frontend }}@${{ steps.frontend_build.outputs.digest }}'
          backend='${{ steps.image_names.outputs.backend }}@${{ steps.backend_build.outputs.digest }}'
          [[ "$frontend" =~ @sha256:[a-f0-9]{64}$ ]]
          [[ "$backend" =~ @sha256:[a-f0-9]{64}$ ]]
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"
          echo "backend=$backend" >> "$GITHUB_OUTPUT"

  save_dev_release:
    name: Save the new image release for development
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build_images
    runs-on: ubuntu-24.04
    steps:
      - name: Check the development AWS settings
        shell: bash
        run: |
          set -euo pipefail
          role_arn='${{ vars.AWS_ROLE_ARN_DEV }}'
          region='${{ vars.AWS_REGION }}'
          parameter_name='${{ vars.SSM_IMAGE_PARAMETER_NAME }}'
          [[ "$role_arn" == "arn:aws:iam::${AWS_ACCOUNT_ID_DEV}:role/"* ]] || { echo 'AWS_ROLE_ARN_DEV is missing or belongs to the wrong account.' >&2; exit 1; }
          [[ "$region" =~ ^[a-z]{2}(-gov)?-[a-z]+-[0-9]+$ ]] || { echo 'AWS_REGION is not configured correctly.' >&2; exit 1; }
          [[ "$parameter_name" == /* ]] || { echo 'SSM_IMAGE_PARAMETER_NAME is not configured correctly.' >&2; exit 1; }
      - name: Sign in to the development AWS account
        uses: aws-actions/configure-aws-credentials@v4.2.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Save the image release in Parameter Store
        shell: bash
        run: |
          set -euo pipefail
          parameter_name='${{ vars.SSM_IMAGE_PARAMETER_NAME }}'
          frontend_image='${{ needs.build_images.outputs.frontend_image }}'
          backend_image='${{ needs.build_images.outputs.backend_image }}'
          actual_account="$(aws sts get-caller-identity --query Account --output text)"
          [[ "$actual_account" == "$AWS_ACCOUNT_ID_DEV" ]] || { echo "Wrong AWS account: $actual_account" >&2; exit 1; }
          manifest="$(jq -cn --arg frontend "$frontend_image" --arg backend "$backend_image" --arg sha "$GITHUB_SHA" --arg updated "$(date -u +%FT%TZ)" '{frontend:$frontend,backend:$backend,git_sha:$sha,updated_at:$updated}')"
          aws ssm put-parameter --name "$parameter_name" --type String --value "$manifest" --overwrite
          printf '### Published images\n- `%s`\n- `%s`\n' "$frontend_image" "$backend_image" >> "$GITHUB_STEP_SUMMARY"

  read_dev_release:
    name: Read the current development image release
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    outputs:
      manifest: ${{ steps.read_release.outputs.manifest }}
      frontend: ${{ steps.read_release.outputs.frontend }}
      backend: ${{ steps.read_release.outputs.backend }}
    steps:
      - name: Confirm the workflow is running from main
        shell: bash
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF" == refs/heads/main ]] || { echo 'Image promotion must run from main.' >&2; exit 1; }
      - name: Check the development AWS settings
        shell: bash
        run: |
          set -euo pipefail
          role_arn='${{ vars.AWS_ROLE_ARN_DEV }}'
          region='${{ vars.AWS_REGION }}'
          parameter_name='${{ vars.SSM_IMAGE_PARAMETER_NAME }}'
          [[ "$role_arn" == "arn:aws:iam::${AWS_ACCOUNT_ID_DEV}:role/"* ]] || { echo 'AWS_ROLE_ARN_DEV is missing or belongs to the wrong account.' >&2; exit 1; }
          [[ "$region" =~ ^[a-z]{2}(-gov)?-[a-z]+-[0-9]+$ ]] || { echo 'AWS_REGION is not configured correctly.' >&2; exit 1; }
          [[ "$parameter_name" == /* ]] || { echo 'SSM_IMAGE_PARAMETER_NAME is not configured correctly.' >&2; exit 1; }
      - name: Sign in to the development AWS account
        uses: aws-actions/configure-aws-credentials@v4.2.1
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN_DEV }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Read and verify the current development release
        id: read_release
        shell: bash
        run: |
          set -euo pipefail
          parameter_name='${{ vars.SSM_IMAGE_PARAMETER_NAME }}'
          actual_account="$(aws sts get-caller-identity --query Account --output text)"
          [[ "$actual_account" == "$AWS_ACCOUNT_ID_DEV" ]] || { echo "Wrong development AWS account: $actual_account" >&2; exit 1; }
          manifest="$(aws ssm get-parameter --name "$parameter_name" --query Parameter.Value --output text)"
          frontend="$(jq -er '.frontend' <<< "$manifest")"
          backend="$(jq -er '.backend' <<< "$manifest")"
          pattern='^ghcr\.io/[a-z0-9_.-]+/[a-z0-9_.-]+@sha256:[a-f0-9]{64}$'
          [[ "$frontend" =~ $pattern ]]
          [[ "$backend" =~ $pattern ]]
          compact="$(jq -c . <<< "$manifest")"
          echo "manifest=$compact" >> "$GITHUB_OUTPUT"
          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"
          echo "backend=$backend" >> "$GITHUB_OUTPUT"

  promote_release:
    name: Promote the development release to ${{ inputs.target }}
    if: github.event_name == 'workflow_dispatch'
    needs: read_dev_release
    runs-on: ubuntu-24.04
    steps:
      - name: Check the selected AWS account settings
        shell: bash
        run: |
          set -euo pipefail
          role_arn='${{ inputs.target == 'staging' && vars.AWS_ROLE_ARN_STAGING || vars.AWS_ROLE_ARN_PROD }}'
          account_id='${{ inputs.target == 'staging' && vars.AWS_ACCOUNT_ID_STAGING || vars.AWS_ACCOUNT_ID_PROD }}'
          region='${{ vars.AWS_REGION }}'
          parameter_name='${{ vars.SSM_IMAGE_PARAMETER_NAME }}'
          [[ "$account_id" =~ ^[0-9]{12}$ ]] || { echo 'The selected AWS account ID is not configured correctly.' >&2; exit 1; }
          [[ "$role_arn" == "arn:aws:iam::${account_id}:role/"* ]] || { echo 'The selected AWS role is missing or belongs to the wrong account.' >&2; exit 1; }
          [[ "$region" =~ ^[a-z]{2}(-gov)?-[a-z]+-[0-9]+$ ]] || { echo 'AWS_REGION is not configured correctly.' >&2; exit 1; }
          [[ "$parameter_name" == /* ]] || { echo 'SSM_IMAGE_PARAMETER_NAME is not configured correctly.' >&2; exit 1; }
      - name: Sign in to the selected AWS account
        uses: aws-actions/configure-aws-credentials@v4.2.1
        with:
          role-to-assume: ${{ inputs.target == 'staging' && vars.AWS_ROLE_ARN_STAGING || vars.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Save the promoted release in Parameter Store
        shell: bash
        run: |
          set -euo pipefail
          expected_account='${{ inputs.target == 'staging' && vars.AWS_ACCOUNT_ID_STAGING || vars.AWS_ACCOUNT_ID_PROD }}'
          parameter_name='${{ vars.SSM_IMAGE_PARAMETER_NAME }}'
          image_manifest='${{ needs.read_dev_release.outputs.manifest }}'
          frontend_image='${{ needs.read_dev_release.outputs.frontend }}'
          backend_image='${{ needs.read_dev_release.outputs.backend }}'
          actual_account="$(aws sts get-caller-identity --query Account --output text)"
          [[ "$actual_account" == "$expected_account" ]] || { echo "Wrong AWS account: $actual_account" >&2; exit 1; }
          aws ssm put-parameter --name "$parameter_name" --type String --value "$image_manifest" --overwrite
          printf '### Promoted to %s\n- `%s`\n- `%s`\n' '${{ inputs.target }}' "$frontend_image" "$backend_image" >> "$GITHUB_STEP_SUMMARY"
