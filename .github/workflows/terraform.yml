name: Plan and Deploy AWS Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: Choose whether to preview, deploy, or remove infrastructure
        type: choice
        options: [plan, apply, destroy]
        required: true
      target:
        description: Choose the AWS account to manage
        type: choice
        options: [dev, staging, prod]
        default: dev
        required: true
      destroy_confirmation:
        description: For destroy, enter DESTROY followed by the target, such as DESTROY dev
        type: string
        required: false

env:
  AWS_ACCOUNT_ID_DEV: "484632959006"

permissions:
  contents: read
  id-token: write

jobs:
  validate_configuration:
    name: Check the infrastructure configuration
    runs-on: ubuntu-24.04
    steps:
      - name: Download the repository source code
        uses: actions/checkout@v4.2.2
      - name: Check Terraform formatting and validity
        uses: ./.github/actions/terraform-operation
        with:
          operation: validate

  create_plan:
    name: Prepare the ${{ inputs.action }} plan for ${{ inputs.target }}
    if: github.event_name == 'workflow_dispatch'
    needs: validate_configuration
    runs-on: ubuntu-24.04
    concurrency:
      group: terraform-deploy-${{ inputs.target }}
      cancel-in-progress: false
    outputs:
      artifact_name: ${{ steps.infrastructure_plan.outputs.artifact_name }}
    steps:
      - name: Download the repository source code
        uses: actions/checkout@v4.2.2
      - name: Validate the workflow request
        uses: ./.github/actions/validate-workflow-request
        with:
          operation: Infrastructure operations
          action: ${{ inputs.action }}
          target: ${{ inputs.target }}
          destroy_confirmation: ${{ inputs.destroy_confirmation }}
      - name: Prepare the selected AWS session
        id: aws_session
        uses: ./.github/actions/aws-session
        with:
          target: ${{ inputs.target }}
          aws_account_id_dev: ${{ env.AWS_ACCOUNT_ID_DEV }}
          aws_role_arn_dev: ${{ vars.AWS_ROLE_ARN_DEV }}
          aws_account_id_staging: ${{ vars.AWS_ACCOUNT_ID_STAGING }}
          aws_role_arn_staging: ${{ vars.AWS_ROLE_ARN_STAGING }}
          aws_account_id_prod: ${{ vars.AWS_ACCOUNT_ID_PROD }}
          aws_role_arn_prod: ${{ vars.AWS_ROLE_ARN_PROD }}
          aws_region: ${{ vars.AWS_REGION }}
          tf_state_bucket: ${{ vars.TF_STATE_BUCKET }}
          require_tf_state_bucket: "true"
          ssm_image_parameter_name: ${{ vars.SSM_IMAGE_PARAMETER_NAME }}
          require_ssm_image_parameter: "true"
      - name: Create and record the infrastructure plan
        id: infrastructure_plan
        uses: ./.github/actions/terraform-operation
        with:
          operation: plan
          action: ${{ inputs.action }}
          target: ${{ inputs.target }}
          expected_account_id: ${{ steps.aws_session.outputs.account_id }}
          aws_account_id_dev: ${{ env.AWS_ACCOUNT_ID_DEV }}
          aws_account_id_staging: ${{ vars.AWS_ACCOUNT_ID_STAGING }}
          aws_account_id_prod: ${{ vars.AWS_ACCOUNT_ID_PROD }}
          aws_region: ${{ vars.AWS_REGION }}
          tf_state_bucket: ${{ vars.TF_STATE_BUCKET }}
          ssm_image_parameter_name: ${{ vars.SSM_IMAGE_PARAMETER_NAME }}
      - name: Upload the plan for the deployment job
        uses: actions/upload-artifact@v4.6.2
        with:
          name: ${{ steps.infrastructure_plan.outputs.artifact_name }}
          path: deploy-artifacts/
          retention-days: 3
          if-no-files-found: error

  execute_plan:
    name: Run the approved ${{ inputs.action }} plan for ${{ inputs.target }}
    if: github.event_name == 'workflow_dispatch' && (inputs.action == 'apply' || inputs.action == 'destroy')
    needs: create_plan
    runs-on: ubuntu-24.04
    concurrency:
      group: terraform-deploy-${{ inputs.target }}
      cancel-in-progress: false
    steps:
      - name: Download the exact repository revision
        uses: actions/checkout@v4.2.2
        with:
          ref: ${{ github.sha }}
      - name: Download the saved infrastructure plan
        uses: actions/download-artifact@v4.3.0
        with:
          name: ${{ needs.create_plan.outputs.artifact_name }}
          path: deploy-artifacts
      - name: Prepare the selected AWS session
        id: aws_session
        uses: ./.github/actions/aws-session
        with:
          target: ${{ inputs.target }}
          aws_account_id_dev: ${{ env.AWS_ACCOUNT_ID_DEV }}
          aws_role_arn_dev: ${{ vars.AWS_ROLE_ARN_DEV }}
          aws_account_id_staging: ${{ vars.AWS_ACCOUNT_ID_STAGING }}
          aws_role_arn_staging: ${{ vars.AWS_ROLE_ARN_STAGING }}
          aws_account_id_prod: ${{ vars.AWS_ACCOUNT_ID_PROD }}
          aws_role_arn_prod: ${{ vars.AWS_ROLE_ARN_PROD }}
          aws_region: ${{ vars.AWS_REGION }}
          tf_state_bucket: ${{ vars.TF_STATE_BUCKET }}
          require_tf_state_bucket: "true"
          ssm_image_parameter_name: ${{ vars.SSM_IMAGE_PARAMETER_NAME }}
          require_ssm_image_parameter: "true"
      - name: Verify and execute the saved infrastructure plan
        uses: ./.github/actions/terraform-operation
        with:
          operation: execute
          action: ${{ inputs.action }}
          target: ${{ inputs.target }}
          expected_account_id: ${{ steps.aws_session.outputs.account_id }}
          aws_account_id_dev: ${{ env.AWS_ACCOUNT_ID_DEV }}
          aws_account_id_staging: ${{ vars.AWS_ACCOUNT_ID_STAGING }}
          aws_account_id_prod: ${{ vars.AWS_ACCOUNT_ID_PROD }}
          aws_region: ${{ vars.AWS_REGION }}
          tf_state_bucket: ${{ vars.TF_STATE_BUCKET }}
          ssm_image_parameter_name: ${{ vars.SSM_IMAGE_PARAMETER_NAME }}
